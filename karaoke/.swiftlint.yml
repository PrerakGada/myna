included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_comma          # SwiftUI multi-line trailing commas read fine
  - todo                    # we keep TODOs intentionally

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - sorted_first_last

analyzer_rules:
  - unused_import

line_length:
  warning: 140
  error: 200
  ignores_urls: true
  ignores_comments: true

file_length:
  warning: 600
  error: 1000

type_body_length:
  warning: 350
  error: 500

function_body_length:
  warning: 80
  error: 150

cyclomatic_complexity:
  warning: 12
  error: 20

identifier_name:
  min_length: 2
  max_length:
    warning: 50
    error: 60
  # Wire-protocol field names are LOCKED short to match Track B's NDJSON.
  # `v`, `i`, `t`, `tMs` come straight from the schema in
  # docs/v0.2-plan/02-karaoke-architecture.md § 2. Don't rename without
  # coordinating with the daemon side.
  excluded:
    - v
    - i
    - t
    - id
    - tMs
    - n
    - fd
    - to
    - at
    - p
    - c
