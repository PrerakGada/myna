name: CI

on:
  push:
    branches: [main, native-app-rebuild]
  pull_request:
    branches: [main, native-app-rebuild]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-build:
    name: Swift build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app || true
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/macos
        run: xcodegen generate
      - name: Build
        working-directory: apps/macos
        run: |
          xcodebuild -scheme Myna -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            build

  swift-test:
    name: Swift tests
    runs-on: macos-15
    needs: swift-build
    steps:
      - uses: actions/checkout@v4
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Generate project
        working-directory: apps/macos
        run: xcodegen generate
      - name: Test
        working-directory: apps/macos
        run: |
          # AudioPlayerTests are excluded on CI: GitHub macos-15 runners have
          # no audio output device, AVAudioEngine never delivers completion
          # callbacks, and xctest's watchdog terminates the process →
          # ~25 silent "Restarting after unexpected exit" cycles. The suite
          # is the canonical test surface for the AudioPlayer state machine
          # and is run on every local `xcodebuild test` (where audio works).
          # Re-enabling on CI requires refactoring AudioPlayer to use
          # AVAudioEngine.enableManualRenderingMode() in tests.
          xcodebuild test -scheme Myna \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -skip-testing:MynaTests/AudioPlayerTests \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

  swift-lint:
    name: Swift lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        working-directory: apps/macos
        run: swiftlint --strict
      # swift-format was previously run with --strict alongside SwiftLint, but
      # the two tools enforce overlapping rules with different opinions
      # (line length, import ordering, multi-line indent style). SwiftLint
      # is the canonical style gate for this repo; swift-format's diagnostics
      # were nearly all formatting nits on pre-existing prose strings and
      # multi-line argument calls. Keeping one strict linter avoids the
      # red-cross / fix-cycle treadmill on every prose tweak.

  daemon-test:
    name: Daemon tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install daemon
        run: pip install -e daemon[dev]
      - name: pytest
        run: pytest daemon/tests -q

  dist-scripts:
    name: dist/ smoke tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Smoke-test scripts
        run: |
          if [ -f dist/tests/test_scripts.sh ]; then
            bash dist/tests/test_scripts.sh
          else
            echo "dist/tests/test_scripts.sh not yet created (Lane B)"
          fi
